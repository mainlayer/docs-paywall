name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test
        env:
          MAINLAYER_API_KEY: test_key
          MAINLAYER_RESOURCE_ID: test_resource

      - name: Build
        run: npm run build
        env:
          MAINLAYER_API_KEY: test_key
          MAINLAYER_RESOURCE_ID: test_resource
